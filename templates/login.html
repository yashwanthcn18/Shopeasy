<!-- login.html — Simple email + password login form -->
{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-box">
  <h2>Welcome back</h2>

  <form method="POST" action="{{ url_for('login') }}" autocomplete="off">

    <label>Email</label>
    <input type="email" name="email" placeholder="you@example.com" autocomplete="new-password" required />

    <label>Password</label>
    <div style="position:relative; margin-bottom:16px;">
      <input type="password" name="password" id="loginPassword" placeholder="••••••••" autocomplete="new-password" required
             style="width:100%; padding:10px 40px 10px 12px;" />
      <button type="button" onclick="togglePw()"
              style="position:absolute; right:10px; top:50%; transform:translateY(-50%);
                     background:none; border:none; cursor:pointer; font-size:1rem; color:#999;">👁</button>
    </div>

    <button class="btn btn-dark" type="submit">Log In</button>

  </form>

  <p class="hint">Don't have an account? <a href="{{ url_for('signup') }}">Sign up</a></p>
</div>

<script>
  function togglePw() {
    var input = document.getElementById('loginPassword');
    input.type = input.type === 'password' ? 'text' : 'password';
  }
</script>
{% endblock %}
