<!-- checkout.html — Shipping address form + order summary side panel -->
{% extends 'base.html' %}
{% block title %}Checkout{% endblock %}

{% block content %}
<h1 class="page-title">Checkout</h1>

<div class="checkout-layout">

  <!-- Left: shipping details form -->
  <div class="checkout-form-box">
    <h3>Shipping Details</h3>

    <form method="POST" action="{{ url_for('checkout') }}">

      <label>Full Name</label>
      <input type="text" name="name" placeholder="John Doe" required />

      <label>Phone Number</label>
      <input type="tel" name="phone" placeholder="9876543210" required />

      <label>Delivery Address</label>
      <textarea name="address" placeholder="House no, Street, City, State, PIN" required></textarea>

      <button class="btn btn-dark" type="submit">Place Order</button>

    </form>
  </div>

  <!-- Right: summary of what's being ordered -->
  <div class="order-summary-box">
    <h3>Order Summary</h3>

    {% for item in items %}
    <div class="summary-row">
      <span>{{ item.product.name }} × {{ item.quantity }}</span>
      <span>₹{{ item.product.price * item.quantity }}</span>
    </div>
    {% endfor %}

    <div class="summary-total">
      <span>Total</span>
      <span>₹{{ total }}</span>
    </div>
  </div>

</div>
{% endblock %}
