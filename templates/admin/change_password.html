<!-- Change admin password — logs out immediately after saving -->
{% extends 'admin/base.html' %}
{% block title %}Change Password{% endblock %}

{% block content %}
<h1 class="page-title">Change Admin Password</h1>

<div class="form-box">
  <form method="POST">

    <label>New Username</label>
    <input type="text" name="username" placeholder="Enter new username" required />

    <label>New Password</label>
    <div style="position:relative; margin-bottom:16px;">
      <input type="password" name="password" id="newPassword" placeholder="Enter new password" required
             style="padding-right:40px;" />
      <!-- Eye toggle -->
      <button type="button" onclick="togglePw()"
              style="position:absolute; right:10px; top:50%; transform:translateY(-50%);
                     background:none; border:none; cursor:pointer; font-size:1rem; color:#94a3b8;">👁</button>
    </div>

    <p style="font-size:0.78rem; color:#ef4444; margin-bottom:16px;">
      ⚠️ You will be logged out immediately after saving.
    </p>

    <div style="display:flex; gap:12px;">
      <button class="btn btn-dark" type="submit">Save & Logout</button>
      <a class="btn" style="background:#f1f5f9; color:#334155;" href="{{ url_for('admin_dashboard') }}">Cancel</a>
    </div>

  </form>
</div>

<script>
  function togglePw() {
    var input = document.getElementById('newPassword');
    input.type = input.type === 'password' ? 'text' : 'password';
  }
</script>
{% endblock %}
