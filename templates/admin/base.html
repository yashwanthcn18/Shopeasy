<!-- Admin base layout — shared sidebar + topbar for all admin pages -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — {% block title %}{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px;
      background: #0f172a;
      color: #cbd5e1;
      display: flex;
      flex-direction: column;
      padding: 24px 0;
      flex-shrink: 0;
    }
    .sidebar .brand {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      padding: 0 24px 24px;
      border-bottom: 1px solid #1e293b;
      margin-bottom: 16px;
    }
    .sidebar a {
      display: block;
      padding: 10px 24px;
      color: #94a3b8;
      text-decoration: none;
      font-size: 0.88rem;
    }
    .sidebar a:hover, .sidebar a.active {
      background: #1e293b;
      color: #fff;
    }
    .sidebar .logout {
      margin-top: auto;
      padding: 16px 24px 0;
      border-top: 1px solid #1e293b;
    }
    .sidebar .logout a {
      color: #f87171;
      padding: 10px 0;
    }

    /* ── Main content ── */
    .main {
      flex: 1;
      padding: 32px;
      overflow-y: auto;
    }

    .page-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 24px;
    }

    /* ── Flash ── */
    .flash {
      background: #fef9c3;
      border: 1px solid #fde047;
      padding: 10px 16px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 0.88rem;
    }

    /* ── Cards / stats ── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: #fff;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .stat-card .label {
      font-size: 0.75rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .stat-card .value {
      font-size: 1.8rem;
      font-weight: 700;
    }

    /* ── Table ── */
    .table-box {
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .table-box table {
      width: 100%;
      border-collapse: collapse;
    }
    .table-box th, .table-box td {
      padding: 12px 16px;
      text-align: left;
      font-size: 0.85rem;
      border-bottom: 1px solid #f1f5f9;
    }
    .table-box th {
      background: #f8fafc;
      font-weight: 600;
      color: #64748b;
    }
    .table-box tr:last-child td { border-bottom: none; }
    .table-box tr:hover td { background: #fafafa; }

    /* ── Buttons ── */
    .btn {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-decoration: none;
    }
    .btn-dark   { background: #0f172a; color: #fff; }
    .btn-dark:hover { background: #1e293b; }
    .btn-blue   { background: #3b82f6; color: #fff; }
    .btn-blue:hover { background: #2563eb; }
    .btn-red    { background: #ef4444; color: #fff; }
    .btn-red:hover  { background: #dc2626; }
    .btn-green  { background: #22c55e; color: #fff; }

    /* ── Form ── */
    .form-box {
      background: #fff;
      border-radius: 10px;
      padding: 32px;
      max-width: 600px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .form-box label {
      display: block;
      font-size: 0.82rem;
      color: #64748b;
      margin-bottom: 4px;
    }
    .form-box input,
    .form-box textarea,
    .form-box select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 0.9rem;
      margin-bottom: 16px;
      font-family: inherit;
      outline: none;
    }
    .form-box input:focus,
    .form-box textarea:focus { border-color: #3b82f6; }
    .form-box textarea { height: 80px; resize: vertical; }

    /* ── Badge ── */
    .badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
    }
    .badge-placed    { background: #dbeafe; color: #1d4ed8; }
    .badge-shipped   { background: #fef3c7; color: #92400e; }
    .badge-delivered { background: #dcfce7; color: #166534; }

    /* ── Product image thumbnail ── */
    .thumb {
      width: 48px;
      height: 48px;
      object-fit: cover;
      border-radius: 6px;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="brand">⚙️ Admin Panel</div>
    <a href="{{ url_for('admin_dashboard') }}"  {% if request.endpoint == 'admin_dashboard'  %}class="active"{% endif %}>Dashboard</a>
    <a href="{{ url_for('admin_products') }}"   {% if 'product' in request.endpoint          %}class="active"{% endif %}>Products</a>
    <a href="{{ url_for('admin_orders') }}"     {% if request.endpoint == 'admin_orders'     %}class="active"{% endif %}>Orders</a>
    <a href="{{ url_for('admin_users') }}"      {% if request.endpoint == 'admin_users'      %}class="active"{% endif %}>Users</a>
    <div class="logout">
      <a href="{{ url_for('admin_change_password') }}">Change Password</a>
      <a href="{{ url_for('admin_logout') }}">Logout</a>
    </div>
  </div>

  <div class="main">
    {% with messages = get_flashed_messages() %}
      {% if messages %}{% for msg in messages %}<div class="flash">{{ msg }}</div>{% endfor %}{% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>

</body>
</html>
